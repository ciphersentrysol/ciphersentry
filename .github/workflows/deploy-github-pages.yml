name: Deploy Cipher Sentry to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Use Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Build cipher-landing
        run: |
          cd cipher-landing
          npm install
          BASE_PATH=/cipher-landing/ npm run build
      - name: Build cipher-sentry
        run: |
          cd cipher-sentry
          npm install
          BASE_PATH=/cipher-sentry/ npm run build
      - name: Prepare GitHub Pages publish directory
        run: |
          mkdir -p gh-pages-temp/cipher-landing
          mkdir -p gh-pages-temp/cipher-sentry
          cp -r cipher-landing/dist/public/* gh-pages-temp/cipher-landing/
          cp -r cipher-sentry/dist/public/* gh-pages-temp/cipher-sentry/
          cat > gh-pages-temp/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Cipher Sentry Pages</title>
              <style>body{font-family:sans-serif;line-height:1.6;padding:2rem;background:#060e0a;color:#d8fff0;}a{color:#6effaf;}</style>
            </head>
            <body>
              <h1>Cipher Sentry</h1>
              <p>Choose an app:</p>
              <ul>
                <li><a href="./cipher-landing/">Cipher Landing</a></li>
                <li><a href="./cipher-sentry/">Cipher Sentry</a></li>
              </ul>
            </body>
          </html>
          EOF
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-temp
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
