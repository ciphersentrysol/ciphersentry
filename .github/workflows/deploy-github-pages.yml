name: Deploy Cipher Sentry to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Use Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Build cipher-landing
        run: |
          REPO_NAME=${GITHUB_REPOSITORY##*/}
          cd cipher-landing
          npm install
          BASE_PATH=/$REPO_NAME/ npm run build
      - name: Build cipher-sentry
        run: |
          REPO_NAME=${GITHUB_REPOSITORY##*/}
          cd cipher-sentry
          npm install
          BASE_PATH=/$REPO_NAME/cipher-sentry/ npm run build
      - name: Prepare GitHub Pages publish directory
        run: |
          mkdir -p gh-pages-temp/cipher-sentry
          mkdir -p gh-pages-temp/cipher-landing
          touch gh-pages-temp/.nojekyll
          echo "ciphersentry.xyz" > gh-pages-temp/CNAME
          cp -r cipher-landing/dist/public/* gh-pages-temp/
          cp -r cipher-landing/dist/public/* gh-pages-temp/cipher-landing/
          cp -r cipher-sentry/dist/public/* gh-pages-temp/cipher-sentry/
      - name: Deploy to GitHub Pages
        # Repository Pages settings must be configured to publish from the gh-pages branch, path /
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-temp
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
