name: Deploy Cipher Sentry to GitHub Pages (docs)

on:
  workflow_dispatch:

jobs:
  build-and-publish-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Build cipher-landing
        run: |
          cd cipher-landing
          npm install
          BASE_PATH=/ npm run build

      - name: Build cipher-sentry
        run: |
          cd cipher-sentry
          npm install
          BASE_PATH=/cipher-sentry/ npm run build

      - name: Prepare docs publish directory
        run: |
          rm -rf docs
          mkdir -p docs/cipher-sentry
          touch docs/.nojekyll
          cp -r cipher-landing/dist/public/* docs/
          cp -r cipher-sentry/dist/public/* docs/cipher-sentry/

      - name: Commit docs to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs
          if git diff --cached --quiet; then
            echo "No docs changes to commit"
          else
            git commit -m 'chore: update GitHub Pages docs site'
            git push origin main
          fi
